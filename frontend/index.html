<!DOCTYPE html>

<html>

<head>

<title>
Weather Intelligence Dashboard
</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div class="container">


<h1>
🌦 Weather Dashboard
</h1>


<p>
Advanced External API Integration
</p>



<div class="search-box">


<input
type="text"
id="cityInput"
placeholder="Enter city name">


<button id="searchBtn">

Search

</button>


</div>



<div id="weatherCard">


<h2 id="city">
City
</h2>


<h3 id="temperature">
-- °C
</h3>


<p id="condition">
Weather
</p>


<div class="details">


<p>
💧 Humidity:
<span id="humidity">--</span>
</p>


<p>
💨 Wind:
<span id="wind">--</span>
</p>


</div>


</div>


<p id="error"></p>



</div>



<script src="js/script.js"></script>


</body>


</html>
